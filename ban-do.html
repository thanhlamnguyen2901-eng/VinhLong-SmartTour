<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khám Phá Vĩnh Long Smart Tour</title>
    <style>
        /* --- CSS CƠ BẢN --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; overflow-x: hidden; }

        /* --- 0. NÚT ĐIỀU HƯỚNG --- */
        #global-nav {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 12px; 
        }
        .nav-btn {
            padding: 10px 18px; background: white; color: #00796b;
            text-decoration: none; font-weight: bold; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; font-size: 0.9rem;
        }
        .nav-btn:hover { background: #00796b; color: white; transform: translateX(5px); }
        .nav-btn.active { background: #00796b; color: white; } /* Thêm hiệu ứng cho nút đang chọn */

        /* --- 1. THANH TIẾN ĐỘ --- */
        #progress-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 280px; background: white; padding: 10px;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100; text-align: center;
        }
        #progress-bar-bg { width: 100%; height: 8px; background: #e0e0e0; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        #progress-bar-fill { width: 0%; height: 100%; background: #4db6ac; transition: 0.5s; }

        /* --- 2. THANH LỌC (SIDEBAR) --- */
        #filter-sidebar {
            position: fixed; left: 20px; top: 260px; /* Đẩy xuống một chút để nhường chỗ cho thanh menu dài hơn */
            width: 200px;
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100;
        }
        .filter-btn {
            width: 100%; padding: 8px; margin-bottom: 5px; border: none;
            background: #f5f5f5; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.3s;
        }
        .filter-btn.active { background: #4db6ac; color: white; }

        /* --- 3. TRIỂN LÃM ẢNH --- */
        #photo-exhibition {
            position: fixed; right: 20px; bottom: 20px; width: 220px;
            background: white; padding: 10px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100;
        }
        #slideshow-img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; transition: opacity 0.5s; }

        /* --- 4. BẢN ĐỒ CHÍNH --- */
        #map-container { 
            width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            padding: 20px;
        }
        #map-wrapper { position: relative; display: inline-block; }
        #main-map { 
            display: block; max-width: 100%; max-height: 85vh; 
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }
        #pins-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* NÚT GHIM (PIN) */
        .pin {
            position: absolute; width: 24px; height: 24px;
            background: #d32f2f; border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg); cursor: pointer; z-index: 50;
            animation: pulse 1.5s infinite; margin-top: -12px; margin-left: -12px;
            pointer-events: auto;
        }
        .pin.visited { background: #4caf50; animation: none; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        /* --- POPUP --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        #modal-content { background: white; width: 90%; max-width: 500px; border-radius: 20px; overflow: hidden; position: relative; }
        #modal-image { width: 100%; height: 200px; object-fit: cover; }
        #modal-info { padding: 20px; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: #000; color: #fff; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }

        /* CHATBOT WIDGET */
        #chat-widget-btn {
            position: fixed; bottom: 180px; right: 30px;
            width: 55px; height: 55px; background: #00796b;
            color: white; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 24px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 1500;
        }
        #chat-popup {
            position: fixed; bottom: 250px; right: 30px;
            width: 320px; height: 400px; background: white;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1500; display: none; flex-direction: column; overflow: hidden;
            border: 2px solid #4db6ac;
        }

        /* --- TỐI ƯU MOBILE --- */
        @media (max-width: 768px) {
            #filter-sidebar, #photo-exhibition { display: none; }
            #global-nav { flex-direction: row; top: auto; bottom: 15px; left: 50%; transform: translateX(-50%); width: 95%; justify-content: flex-start; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; }
            .nav-btn { flex: 0 0 auto; }
            #progress-container { width: 220px; top: 10px; }
            #map-container { padding: 0; overflow: auto; display: block; -webkit-overflow-scrolling: touch; }
            #map-wrapper { width: 1100px; } 
            .pin { width: 32px; height: 32px; }
            #chat-widget-btn { bottom: 80px; right: 20px; }
            #chat-popup { width: 90%; right: 5%; bottom: 150px; }
        }
    </style>
</head>

            { id: 38, type: 'ton-giao', name: "Chùa Phước Hậu", top: "17.4%", left: "24.6%", img: "images/locations/chua-phuoc-hau.jpg", audio: "audio/voice/chua-phuoc-hau.mp3", videoId: "chua-phuoc-hau", desc: "Sở hữu Vườn Kinh đá độc đáo, sự kết hợp tuyệt vời giữa tâm linh và nghệ thuật đá." }
        ];

        let visitedList = new Set();

        function renderPins(filterType = 'all') {
            const pinsArea = document.getElementById('pins-area');
            pinsArea.innerHTML = ''; 
            locations.forEach(loc => {
                if (filterType === 'all' || loc.type === filterType) {
                    const pin = document.createElement('div');
                    pin.className = `pin ${visitedList.has(loc.id) ? 'visited' : ''}`;
                    pin.style.top = loc.top;
                    pin.style.left = loc.left;
                    pin.title = loc.name;
                    pin.onclick = () => openModal(loc);
                    pinsArea.appendChild(pin);
                }
            });
        }

        function filterMap(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderPins(type);
        }

        function openModal(loc) {
            document.getElementById('modal-title').innerText = loc.name;
            document.getElementById('modal-desc').innerText = loc.desc;
            document.getElementById('modal-image').src = loc.img;
            document.getElementById('modal-overlay').style.display = 'flex';
            
            // Xử lý nút xem video
            const videoBtn = document.getElementById('view-video-btn');
            if (loc.videoId) {
                videoBtn.href = `video.html#${loc.videoId}`;
                videoBtn.style.display = 'inline-block';
            } else {
                videoBtn.style.display = 'none';
            }

            const player = document.getElementById('audio-player');
            player.src = loc.audio;
            player.play().catch(e => console.log("Audio play blocked"));

            if (!visitedList.has(loc.id)) {
                visitedList.add(loc.id);
                updateProgress();
                renderPins(document.querySelector('.filter-btn.active').innerText.toLowerCase().includes('tất cả') ? 'all' : loc.type); 
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('audio-player').pause();
            document.getElementById('audio-player').currentTime = 0;
        }

        function updateProgress() {
            const count = visitedList.size;
            document.getElementById('visited-count').innerText = count;
            const percent = (count / 38) * 100;
            document.getElementById('progress-bar-fill').style.width = percent + '%';
        }

        function toggleChat() {
            const chatPopup = document.getElementById('chat-popup');
            chatPopup.style.display = (chatPopup.style.display === 'flex') ? 'none' : 'flex';
        }

        const galleryImages = [
            { src: "images/locations/photo1.jpg", title: "Bình minh trên dòng Cổ Chiên" },
            { src: "images/locations/photo2.jpg", title: "Cầu Mỹ Thuận lung linh" }
        ];
        let currentImg = 0;
        function startSlideshow() {
            setInterval(() => {
                currentImg = (currentImg + 1) % galleryImages.length;
                const imgTag = document.getElementById('slideshow-img');
                imgTag.src = galleryImages[currentImg].src;
                document.getElementById('photo-title').innerText = galleryImages[currentImg].title;
            }, 5000);
        }

        window.onload = () => {
            renderPins();
            startSlideshow();
        };
    </script>
